services:
  - type: web
    name: telegram-astrology-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: FREEASTRO_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemma-4-31b-it
      - key: FREEASTRO_MCP_URL
        value: https://api.freeastroapi.com/mcp
      - key: WEBHOOK_PATH
        value: /telegram/webhook
      - key: WEBHOOK_BASE_URL
        sync: false
